#local_backend: true
# Configurazione del backend (Decap si collegherà a GitHub tramite Netlify)
backend:
  name: git-gateway
  branch: main # Sostituisci con "master" se il tuo branch principale si chiama così

# Dove Decap salva i file sul tuo Mac quando li carichi dal pannello
media_folder: "src/img/blog"

# Il percorso esatto che Decap deve scrivere nel file .md (Astro lo adorerà)
public_folder: "../../img/blog"

# Configurazione della collezione del Blog
collections:
  - name: "blog"
    label: "Articoli Blog"
    folder: "src/content/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: "mdx"
    format: "frontmatter"
    fields:
      - { label: "Titolo Principale (H1)", name: "title", widget: "string" }
      - { label: "Titolo SEO (Google)", name: "metaTitle", widget: "string", required: false, hint: "Appare nei risultati di Google. Massimo 60 caratteri. Se vuoto, usa il Titolo Principale." } 
      - { label: "Meta Description (SEO)", name: "description", widget: "text", hint: "Il riassunto che si legge su Google e sui social. Consigliato tra i 140 e i 160 caratteri." } 
      - { label: "Data di Pubblicazione", name: "pubDate", widget: "datetime" }
      - { label: "Immagine di Copertina", name: "heroImage", widget: "image" }
      - { label: "Testo Alternativo Immagine (Alt)", name: "heroImageAlt", widget: "string", required: false, hint: "Descrivi cosa si vede nella foto per aiutare il posizionamento su Google Immagini." }
      - { label: "Categoria", name: "category", widget: "select", options: ["Naturopatia", "Riflessologia", "Benessere Femminile", "Inspirazione"] }
      - { label: "Bozza", name: "draft", widget: "boolean", default: false, hint: "Attiva per salvare come bozza senza pubblicare sul sito." }
      - label: "Testo dell'Articolo"
        name: "body"
        widget: "markdown"
        minimal: false
        buttons:
          - bold
          - italic
          - link
          - heading-two
          - heading-three
          - bulleted-list
          - numbered-list
          - quote
        editor_components:
          - image